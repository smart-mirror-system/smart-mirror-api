name: CI

on:
  push:
    branches:
      - devops
    tags:
      - "v*.*.*" # triggers on semantic version tags like v1.0.0, v2.1.3, etc.
  pull_request:
    branches:
      - devops

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  test:
    uses: ./.github/workflows/test.yaml

  codeql-security-analysis:
    uses: ./.github/workflows/codeql-security-analysis.yaml
    secrets: inherit

  build_and_push:
    needs: [test, codeql-security-analysis]
    uses: ./.github/workflows/docker.yaml
    secrets: inherit

  notify_team:
    needs: build_and_push
    uses: ./.github/workflows/notify.yaml
    secrets: inherit

name: CI

on:
  push:
    branches:
      - devops
      - main
    tags:
      - "v*.*.*" # triggers on semantic version tags like v1.0.0, v2.1.3, etc.
  pull_request:
    branches:
      - devops
      - main

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    uses: ./.github/workflows/test.yaml

  security:
    name: Security Analysis
    uses: ./.github/workflows/codeql-security-analysis.yaml
    secrets: inherit
    permissions:
      security-events: write
      packages: read

  docker:
    needs: [test, security]
    uses: ./.github/workflows/docker.yaml
    secrets: inherit

  notify:
    needs: docker
    uses: ./.github/workflows/notify.yaml
    secrets: inherit
